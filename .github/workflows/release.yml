name: Release packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build macchiato-bot wheel
        run: uv build --wheel -o dist/

      - name: Build macchiato-remote wheel
        run: uv build --wheel -o dist/ packages/macchiato-remote

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Upload wheels for PyPI
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels
          path: dist/*.whl

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: pypi-wheels
          path: dist/

      - uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI (skip versions already on index)
        run: bash deploy/publish-dist.sh dist
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
