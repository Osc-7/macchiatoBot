# Example config: copy to config.yaml beside this file and customize.
# Put secrets in repo-root .env; use ${ENV_VAR} in values where noted.
# LLM: set llm.active to a provider key; add entries under llm.providers and/or files in llm.providers.d.
# CLI /model lists providers; switch using the same label or key shown in the list.
# Optional provider_include merges YAML after providers_dir; duplicate keys use the later file.

llm:
  active: "default"            # default chat provider key
  vision_provider: null        # recognize_image; null picks first provider with vision: true
  summary_model: null          # light summarization; null uses active provider model
  temperature: 0.7
  max_tokens: 4096
  request_timeout_seconds: 120
  stream: true
  providers_dir: llm/providers.d
  # provider_include: []

  # Keep at least one inline provider if providers_dir is empty; directory entries override same keys here.
  providers:
    default:
      base_url: "https://api.openai.com/v1"
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o-mini"
      # Optional pricing per 1M tokens; cost_yuan uses cny_per_currency_unit.
      pricing:
        currency: "USD"
        cny_per_currency_unit: 7.25
        input_per_million: 0.15
        output_per_million: 0.60
      vendor_params: {}
      capabilities:
        vision: true
        function_calling: true
        parallel_tool_calls: true

# Multimodal: use attach_media so images attach on the next LLM turn.
multimodal:
  enabled: false
  model: null   # e.g. qwen-vl-max-latest; null uses active provider model id
  max_image_size_mb: 8
  request_timeout_seconds: 120

canvas:
  enabled: false
  api_key: null  # or CANVAS_API_KEY in .env
  base_url: "https://oc.sjtu.edu.cn/api/v1"
  default_days_ahead: 60
  include_submitted: false

# SJTU jAccount: log in, export session cookies JSON, set path below.
sjtu_jw:
  cookies_path: "./data/sjtu_jw_cookies.json"

# Shuiyuan Discourse: set user_api_key or SHUIYUAN_USER_API_KEY in .env.
# Key helper: uv run python -m frontend.shuiyuan_integration.user_api_key
# Connector for notifications: uv run python -m frontend.shuiyuan_integration.connector
shuiyuan:
  owner_username: null  # bot only responds when @this user and invocation_trigger matches
  invocation_trigger: ""
  # Empty allowed_topic_ids: notify mode. Non-empty: poll listed topics only, higher rate-limit risk.
  allowed_topic_ids: []
  enabled: false
  user_api_key: null
  site_url: "https://shuiyuan.sjtu.edu.cn"
  # Connector notify cursor: db_base_dir/connector_notify_stream.json
  db_base_dir: "./data/shuiyuan"  # per-user DB under users/<username>/
  memory:
    chat_limit_per_user: 100
    thread_posts_count: 50
    tool_max_posts: 50  # max posts returned by Shuiyuan search tools
  rate_limit:
    replies_per_minute: 5

# Declarative jobs; automation_daemon maps them to JobDefinition entries.
automation:
  jobs:
    - name: "daily_memory_sync"
      description: "Scheduled task: review reflection and memory files, persist important long-term facts to memory, reply with actions and outcome only."
      daily_time: "15:00"
      memory_owner: "cli:root"
      enabled: true

time:
  timezone: "Asia/Shanghai"
  sleep_start: "23:00"
  sleep_end: "08:00"

# Required for plan_tasks.
planning:
  timezone: "Asia/Shanghai"
  lookahead_days: 7
  min_block_minutes: 30
  break_minutes_after_task: 15   # minutes between tasks
  prefer_weekday_slots: true
  # weekday: 1 = Monday through 7 = Sunday
  working_hours:
    - weekday: 1
      start: "09:00"
      end: "22:00"
    - weekday: 2
      start: "09:00"
      end: "22:00"
    - weekday: 3
      start: "09:00"
      end: "22:00"
    - weekday: 4
      start: "09:00"
      end: "22:00"
    - weekday: 5
      start: "09:00"
      end: "22:00"
    - weekday: 6
      start: "09:00"
      end: "22:00"
    - weekday: 7
      start: "09:00"
      end: "22:00"
  weights:
    urgency: 0.4
    difficulty: 0.3
    importance: 0.3
    overdue_bonus: 0.2

storage:
  type: "json"
  data_dir: "./data"
  events_file: "events.json"
  tasks_file: "tasks.json"

# Read is on by default; enable write/modify explicitly for safety.
file_tools:
  enabled: true
  allow_read: true
  allow_write: false
  allow_modify: false
  base_dir: "."       # relative paths resolve here; absolute paths bypass the jail root

command_tools:
  enabled: true
  allow_run: true
  # Optional Linux per-tenant OS user for bash; needs root and util-linux runuser.
  # bash_os_user_enabled: false
  # bash_runuser_path: "/sbin/runuser"
  # bash_os_tenant_user_prefix: "m_"
  # bash_os_user_home_base_dir: "/home"
  # bash_os_auto_provision_users: true
  # workspace_admin_memory_owners grants sudo/admin capability to the same logic Linux user
  # (for example cli:root -> m_cli_root), not to a shared admin account.
  allow_run_for_subagent: false
  # 后台 bash job 主动通知配置
  # bash_job_notify_poll_seconds: 3
  # bash_job_status_min_interval_seconds: 5
  # bash_job_notify_inject_enabled: true
  # subagent_command_whitelist: ["ls", "pwd", "cat", "head", "tail", "grep", "find", "echo", "which", "file", "stat", "wc", "date", "whoami", "id", "env", "printenv"]
  workspace_base_dir: "./data/workspace"
  workspace_isolation_enabled: true   # false: shared cwd, weaker cd guard
  # workspace_admin_memory_owners: ["cli:root"]
  # bash_extra_write_roots: []
  # acl_base_dir: "./data/acl"
  # base_dir: "."
  # bash_real_home_path_suffixes: [".local/share/pnpm"]

agent:
  max_iterations: 10
  subagent_max_seconds: 600
  subagent_max_tokens: 500000
  # subagent_max_context_tokens: null
  subagent_max_iterations: 15
  enable_debug: true
  working_set_size: 6

tools:
  core_tools:
    - "search_tools"
    - "call_tool"
    - "bash"
    - "request_permission"
    - "ask_user"
  pinned_tools:
    - "load_skill"
    - "web_search"
    - "read_file"
    - "write_file"
    - "modify_file"
    - "extract_web_content"
    - "attach_media"
    - "memory_search_long_term"
    - "memory_search_content"
    - "memory_store"
    - "memory_ingest"
    - "list_scheduled_jobs"
    - "delete_scheduled_job"
  templates:
    default:
      exposure: "pinned"
      extra: []
    shuiyuan:
      exposure: "empty"
      extra:
        - "shuiyuan_search"
        - "shuiyuan_get_topic"
        - "shuiyuan_browse_topic"
        - "shuiyuan_get_latest"
        - "shuiyuan_get_top"
        - "shuiyuan_get_categories"
        - "shuiyuan_get_category_topics"
        - "shuiyuan_post_retort"
        - "attach_image_to_reply"
    cron:
      exposure: "empty"
      extra:
        - "parse_time"
        - "add_event"
        - "add_task"
        - "get_events"
        - "get_tasks"
        - "update_event"
        - "update_task"
        - "delete_schedule_data"
        - "get_free_slots"
        - "plan_tasks"
        - "sync_sources"
        - "get_sync_status"
        - "get_digest"
        - "list_notifications"
        - "ack_notification"
        - "configure_automation_policy"
        - "get_automation_activity"
        - "create_scheduled_job"
        - "list_scheduled_jobs"
        - "delete_scheduled_job"
        - "notify_owner"

# External MCP servers register tools into the agent. Built-in schedule tools use the in-process registry unless inject_builtin_schedule_mcp is true.
mcp:
  enabled: true
  inject_builtin_schedule_mcp: false
  call_timeout_seconds: 30
  servers:
    # Tavily: set TAVILY_API_KEY in .env, then enable this server.
    - name: "tavily"
      enabled: false
      transport: "stdio"
      command: "npx"
      args: ["-y", "tavily-mcp@latest"]
      env:
        NODE_NO_WARNINGS: "1"
        NODE_ENV: "production"
      cwd: "."
      tool_name_prefix: "tavily"
      init_timeout_seconds: 20
      call_timeout_seconds: 45

skills:
  enabled: []  # empty lists all skills under cli_dir; non-empty filters the index
  cli_dir: "~/.agents/skills"

feishu:
  enabled: false
  app_id: ""
  app_secret: ""
  verification_token: ""
  encrypt_key: ""         # required when payload encryption is on; card buttons need matching setup
  base_url: "https://open.feishu.cn"  # Lark international: https://open.larksuite.com
  domain: "feishu"        # feishu or lark
  automation_ipc_timeout_seconds: 1800
  automation_activity_enabled: false
  automation_activity_chat_id: ""  # or FEISHU_AUTOMATION_CHAT_ID
  tool_trace_cards_enabled: true
  reply_format: markdown_card
  assistant_reply_stream: true
  assistant_cardkit_stream: true
  # 远程登录审批白名单（优先级低于环境变量
  # MACCHIATO_REMOTE_LOGIN_APPROVER_OPEN_IDS / MACCHIATO_REMOTE_LOGIN_APPROVER_USER_IDS）
  remote_login_approver_open_ids: []
  remote_login_approver_user_ids: []

memory:
  enabled: true
  max_working_tokens: 8000
  working_summary_threshold: 0.8
  working_summary_hard_ratio: null
  working_keep_recent: 4
  context_window_ratio: 0.75
  max_tool_result_tokens: 30000
  tool_result_overflow_dir: ".tool_results"
  memory_base_dir: "./data/memory"
  recall_top_n: 5
  recall_score_threshold: 0.3
  force_recall: false
  qmd_enabled: false
  qmd_command: "qmd"

logging:
  session_log_dir: "./logs/sessions"
  enable_session_log: true
  enable_detailed_log: true
  max_system_prompt_log_len: 2000  # max chars stored per system prompt when detailed log is on; raise to keep more

ui:
  show_draft: "summary"  # off | summary | full
  draft_max_chars: 500
  dim_draft: true
