  model: "deepseek-v4-pro"
  pricing:
    # 当前按本地预算口径填写；DeepSeek 价格/促销变化时改这里。
    currency: "CNY"
    cny_per_currency_unit: 1.0
    input_cache_hit_per_million: 0.025
    input_cache_miss_per_million: 3
    output_per_million: 6
