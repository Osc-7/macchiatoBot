# Google Gemini API（OpenAI 兼容 Chat Completions）
# 获取密钥: https://aistudio.google.com/apikey · 文档: https://ai.google.dev/gemini-api/docs/openai
# 模型说明见: https://ai.google.dev/gemini-api/docs/gemini-3 · 当前 ID 为官方表格中的 Gemini 3 Flash（preview）

gemini_3_flash:
  label: "Gemini 3 Flash"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
  api_key: "${GEMINI_API_KEY}"
  model: "gemini-3-flash-preview"
  temperature: 1.0
  vendor_params: {}
  capabilities:
    vision: true
    function_calling: true
    parallel_tool_calls: true
    reasoning_content: true
    thinking_tag_inline: false
    context_window: 1000000
