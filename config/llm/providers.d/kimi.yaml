kimi_code:
  label: "Kimi Code"
  base_url: "https://api.kimi.com/coding/v1"
  api_key: "${KIMI_CODE_API_KEY}"
  model: "kimi-for-coding"
  temperature: 1.0
  protocol: "anthropic"
  # Anthropic 扩展思考要求 budget_tokens；见
  # https://docs.anthropic.com/en/docs/build-with-claude/extended-thinking
  vendor_params:
    thinking:
      type: "enabled"
      budget_tokens: 16000
  # headers:
  #   User-Agent: "claude-code/0.1.0"
  capabilities:
    vision: true
    function_calling: true
    parallel_tool_calls: true
    reasoning_content: true
    thinking_tag_inline: false
    context_window: 262144
    file_input_mime_types:
      - application/pdf

kimi_k2.6:
  label: "Kimi K2.6"
  base_url: "https://api.moonshot.cn/v1"
  api_key: "${MOONSHOT_API_KEY}"
  model: "kimi-k2.6"
  temperature: 1.0
  vendor_params:
    thinking:
      type: "enabled"
  capabilities:
    vision: true
    function_calling: true
    parallel_tool_calls: true
    reasoning_content: true
    thinking_tag_inline: false
    context_window: 262144
