# OpenAI 官方 Chat Completions（与任意 OpenAI 兼容网关相同用法）
# 文档: https://platform.openai.com/docs/api-reference/chat/create
# 环境变量: OPENAI_API_KEY（见仓库根 .env.example）
# 将 llm.active 设为本文件中某一 key，或在对话里 /model <name> 切换

openai_official_gpt4o_mini:
  label: "OpenAI GPT-4o mini"
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4o-mini"
  vendor_params: {}
  capabilities:
    vision: true
    function_calling: true
    parallel_tool_calls: true
    reasoning_content: false
    thinking_tag_inline: false
    context_window: null

openai_official_gpt4o:
  label: "OpenAI GPT-4o"
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4o"
  vendor_params: {}
  capabilities:
    vision: true
    function_calling: true
    parallel_tool_calls: true
    reasoning_content: false
    thinking_tag_inline: false
    context_window: null
