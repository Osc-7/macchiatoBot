# systemd drop-in：为常驻进程注入 HTTP(S) 代理，使 Gemini / OpenAI 等境外 API 可走本机 Clash 等。
# 同时设置 NO_PROXY，国内/校园 API 直连，避免无谓绕代理。
#
# 安装：由 deploy/systemd/install.sh --with-proxy 复制到各 macchiato-*.service.d/
# 或手动：sudo mkdir -p /etc/systemd/system/macchiato-automation.service.d
#         sudo cp 50-macchiato-proxy.conf /etc/systemd/system/macchiato-automation.service.d/
#
# 若本地代理端口不是 7890，请改下面两行 URL 后 daemon-reload + restart。

[Service]
Environment=HTTP_PROXY=http://127.0.0.1:7890
Environment=HTTPS_PROXY=http://127.0.0.1:7890
Environment=NO_PROXY=localhost,127.0.0.1,::1,dashscope.aliyuncs.com,aliyuncs.com,models.sjtu.edu.cn,shuiyuan.sjtu.edu.cn,oc.sjtu.edu.cn,api.deepseek.com,api.moonshot.cn,api.kimi.com,open.feishu.cn,internal-api.feishu.cn,msg-frontier.feishu.cn
