# systemd drop-in：限制 macchiato-automation 所在 cgroup 的内存与 CPU，防止子进程（如 bash 内 python）
# 吃满整机内存导致 SSH/整机假死。子进程与 MCP（node）均属本单元，一并计入限额。
#
# 安装：install.sh --with-resource-limits
# 或手动：sudo mkdir -p /etc/systemd/system/macchiato-automation.service.d
#         sudo cp 50-macchiato-resource-limits.conf /etc/systemd/system/macchiato-automation.service.d/
#         sudo systemctl daemon-reload && sudo systemctl restart macchiato-automation.service
#
# 实机内存较小时请酌情调低 MemoryMax / MemoryHigh（须 MemoryHigh ≤ MemoryMax）。

[Service]
MemoryHigh=3.0G
MemoryMax=3.5G
MemorySwapMax=0
TasksMax=128
CPUQuota=80%
Restart=on-failure
RestartSec=10
