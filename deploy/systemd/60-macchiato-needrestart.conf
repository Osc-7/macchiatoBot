# needrestart guard for macchiatoBot.
#
# Ubuntu runs needrestart from an apt hook and may automatically restart
# services after package installs/upgrades. Restarting the Feishu gateway while
# a run_turn_stream request is active drops the IPC stream, so keep macchiato
# services out of automatic apt-triggered restarts and batch reports. Operators
# can still restart them explicitly with systemctl after a maintenance window.

$nrconf{blacklist_rc} = [] unless ref($nrconf{blacklist_rc}) eq 'ARRAY';
push(@{$nrconf{blacklist_rc}}, qr(^macchiato-.*\.service$));
$nrconf{override_rc}->{qr(^macchiato-.*\.service$)} = 0;
